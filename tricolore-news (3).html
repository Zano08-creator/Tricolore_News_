<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tricolore News</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #009246; --red: #ce2b37;
      --dark: #0d0d1a; --card: #1a1a2e;
      --border: rgba(255,255,255,0.08); --text: #e8e8f0; --muted: #8888aa;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; background: var(--dark); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    .tricolore { display: flex; height: 5px; width: 100%; }
    .tricolore .g { background: var(--green); flex: 1; }
    .tricolore .w { background: #ffffff; flex: 1; }
    .tricolore .r { background: var(--red); flex: 1; }

    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 2rem;
      background: rgba(13,13,26,0.95); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
      border-bottom: 0.5px solid var(--border);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.3rem; }
    .nav-logo .g { color: var(--green); }
    .nav-logo .r { color: var(--red); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .nav-status {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted);
      background: rgba(0,146,70,0.1); border: 0.5px solid rgba(0,146,70,0.3);
      border-radius: 999px; padding: 5px 14px;
    }
    .nav-dot { width: 7px; height: 7px; background: #2ecc71; border-radius: 50%; animation: pulse 1.6s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .refresh-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.05); border: 0.5px solid var(--border);
      border-radius: 999px; padding: 5px 14px;
      font-size: 12px; color: var(--muted); cursor: pointer;
      transition: background 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.2); }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 1s linear infinite; }

    .hero { text-align: center; padding: 4rem 2rem 2.5rem; position: relative; }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(0,146,70,0.08) 0%, transparent 70%),
                  radial-gradient(ellipse 40% 40% at 80% 80%, rgba(206,43,55,0.06) 0%, transparent 60%);
      pointer-events: none;
    }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.4rem, 5vw, 3.8rem); font-weight: 600; line-height: 1.1; margin-bottom: 0.8rem; }
    .hero h1 .g { color: var(--green); }
    .hero h1 .r { color: var(--red); }
    .hero p { font-size: 1rem; color: var(--muted); max-width: 480px; margin: 0 auto; line-height: 1.75; font-weight: 300; }

    .last-update { font-size: 11px; color: var(--muted); text-align: center; padding: 0.4rem; opacity: 0.6; }

    section { max-width: 960px; margin: 0 auto; padding: 2rem 1.5rem; }

    .section-label {
      font-size: 11px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 1.5px; color: var(--muted); margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 10px;
    }
    .section-label::after { content: ''; flex: 1; height: 0.5px; background: var(--border); }

    .tabs { display: flex; gap: 8px; margin-bottom: 1.4rem; flex-wrap: wrap; }
    .tab {
      font-size: 12px; padding: 5px 14px; border-radius: 999px;
      border: 0.5px solid var(--border); background: transparent;
      color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }
    .tab:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .tab.active { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.25); color: var(--text); }

    .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
    .news-card {
      background: var(--card); border: 0.5px solid var(--border);
      border-radius: 12px; padding: 1.1rem;
      transition: border-color 0.2s, transform 0.2s;
      display: flex; flex-direction: column;
    }
    .news-card:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); }
    .news-card a { text-decoration: none; color: inherit; display: flex; flex-direction: column; height: 100%; }

    .news-tag {
      display: inline-block; font-size: 10px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.6px;
      padding: 3px 9px; border-radius: 999px; margin-bottom: 9px; align-self: flex-start;
    }
    .tag-politica { background: rgba(55,138,221,0.15); color: #85b7eb; }
    .tag-economia { background: rgba(99,153,34,0.15); color: #97c459; }
    .tag-cronaca  { background: rgba(206,43,55,0.15); color: #f09595; }
    .tag-europa   { background: rgba(212,83,126,0.15); color: #ed93b1; }
    .tag-esteri   { background: rgba(127,119,221,0.15); color: #afa9ec; }
    .tag-sport    { background: rgba(186,117,23,0.15); color: #fac775; }
    .tag-altro    { background: rgba(136,136,170,0.15); color: #b4b2a9; }

    .news-card h3 { font-size: 14px; font-weight: 500; line-height: 1.5; margin-bottom: 7px; color: var(--text); flex: 1; }
    .news-card p  { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }
    .news-meta { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
    .news-source { font-size: 11px; color: rgba(136,136,170,0.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 55%; }
    .news-time   { font-size: 11px; color: rgba(136,136,170,0.5); }

    .skeleton-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
    .skeleton-card { background: var(--card); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.1rem; height: 190px; }
    .skel { background: rgba(255,255,255,0.05); border-radius: 6px; animation: shimmer 1.5s infinite; }
    .skel-tag { height: 18px; width: 70px; margin-bottom: 10px; }
    .skel-h   { height: 14px; width: 100%; margin-bottom: 6px; }
    .skel-h2  { height: 14px; width: 75%; margin-bottom: 14px; }
    .skel-p   { height: 12px; width: 100%; margin-bottom: 5px; }
    .skel-p2  { height: 12px; width: 60%; }
    @keyframes shimmer { 0%,100%{opacity:0.35} 50%{opacity:0.7} }

    .error-box {
      background: rgba(206,43,55,0.1); border: 0.5px solid rgba(206,43,55,0.3);
      border-radius: 12px; padding: 1.5rem; text-align: center; color: #f09595; font-size: 14px; line-height: 1.8;
    }

    hr.divider { border: none; border-top: 0.5px solid var(--border); margin: 0 1.5rem; }
    footer { text-align: center; padding: 2rem 1.5rem; font-size: 12px; color: var(--muted); }
    .footer-logo { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 6px; }
    .footer-logo .g { color: var(--green); }
    .footer-logo .r { color: var(--red); }
    .tricolore-mini { display: flex; width: 50px; height: 4px; border-radius: 3px; overflow: hidden; margin: 0.8rem auto 0.6rem; }
  </style>
</head>
<body>

<div class="tricolore"><div class="g"></div><div class="w"></div><div class="r"></div></div>

<nav>
  <div class="nav-logo"><span class="g">Tricolore</span> <span class="r">News</span></div>
  <div class="nav-right">
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
      <span id="refreshIcon">↻</span> Aggiorna
    </button>
    <div class="nav-status"><div class="nav-dot"></div> Live</div>
  </div>
</nav>

<div class="hero">
  <h1><span class="g">Tricolore</span> <span class="r">News</span></h1>
  <p>Notizie italiane e politica italo-europea aggiornate in tempo reale.</p>
</div>
<div class="last-update" id="lastUpdate"></div>

<section>
  <div class="tabs" id="tabs">
    <button class="tab active" data-cat="tutte">Tutte</button>
    <button class="tab" data-cat="politica">Politica</button>
    <button class="tab" data-cat="economia">Economia</button>
    <button class="tab" data-cat="europa">Europa</button>
    <button class="tab" data-cat="cronaca">Cronaca</button>
    <button class="tab" data-cat="esteri">Esteri</button>
    <button class="tab" data-cat="sport">Sport</button>
  </div>
  <div id="newsContainer"></div>
</section>

<hr class="divider" />

<footer>
  <div class="footer-logo"><span class="g">Tricolore</span> <span class="r">News</span></div>
  <div class="tricolore-mini">
    <div style="background:var(--green);flex:1"></div>
    <div style="background:#fff;flex:1"></div>
    <div style="background:var(--red);flex:1"></div>
  </div>
  Informazione italiana in tempo reale · RSS feeds
</footer>

<div class="tricolore"><div class="g"></div><div class="w"></div><div class="r"></div></div>

<script>
  // Feed RSS italiani — nessuna chiave API richiesta
  const FEEDS = [
    { url: 'https://www.ansa.it/sito/notizie/politica/politica_rss.xml',        source: 'ANSA',           cat: 'politica' },
    { url: 'https://www.ansa.it/sito/notizie/economia/economia_rss.xml',        source: 'ANSA',           cat: 'economia' },
    { url: 'https://www.ansa.it/sito/notizie/mondo/mondo_rss.xml',              source: 'ANSA',           cat: 'esteri'   },
    { url: 'https://www.ansa.it/sito/notizie/cronaca/cronaca_rss.xml',          source: 'ANSA',           cat: 'cronaca'  },
    { url: 'https://www.corriere.it/rss/homepage.xml',                          source: 'Corriere',       cat: 'auto'     },
    { url: 'https://www.repubblica.it/rss/homepage/rss2.0.xml',                 source: 'Repubblica',     cat: 'auto'     },
    { url: 'https://www.lastampa.it/rss.xml',                                   source: 'La Stampa',      cat: 'auto'     },
    { url: 'https://www.ilsole24ore.com/rss/italia--politica-e-societa.xml',    source: 'Il Sole 24 Ore', cat: 'politica' },
    { url: 'https://www.ilsole24ore.com/rss/economia-e-finanza.xml',            source: 'Il Sole 24 Ore', cat: 'economia' },
    { url: 'https://www.euronews.com/rss?format=mrss&level=theme&name=news',    source: 'Euronews',       cat: 'europa'   },
    { url: 'https://www.gazzetta.it/rss/home.xml',                              source: 'Gazzetta',       cat: 'sport'    },
  ];

  // Proxy pubblico per aggirare il CORS sui feed RSS
  const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

  let allNews = [];
  let currentCat = 'tutte';

  function timeAgo(dateStr) {
    if (!dateStr) return '';
    const diff = Math.floor((Date.now() - new Date(dateStr)) / 60000);
    if (diff < 1) return 'adesso';
    if (diff < 60) return diff + ' min fa';
    if (diff < 1440) return Math.floor(diff / 60) + ' ore fa';
    return Math.floor(diff / 1440) + ' giorni fa';
  }

  function guessCategory(title, desc) {
    const t = (title + ' ' + (desc || '')).toLowerCase();
    if (/governo|parlamento|premier|ministr|meloni|politica|elezioni|senato|camera|partito|legge|decreto/.test(t)) return 'politica';
    if (/pil|economia|mercati|borsa|inflazione|bce|euro|lavoro|occupazione|banca|spread|tassi/.test(t)) return 'economia';
    if (/ue |unione europea|bruxelles|ursula|commissione europea|parlamento europeo|eurovision/.test(t)) return 'europa';
    if (/serie a|calcio|sport|inter|juventus|milan|roma|napoli|champions|formula|tennis|olimpi/.test(t)) return 'sport';
    if (/trump|usa|russia|ucraina|cina|guerra|nato|medio oriente|israele|putin|zelensky/.test(t)) return 'esteri';
    return 'cronaca';
  }

  function stripHtml(html) {
    if (!html) return '';
    return html.replace(/<[^>]*>/g, '').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').replace(/&#39;/g,"'").trim();
  }

  function showSkeleton() {
    document.getElementById('newsContainer').innerHTML = `
      <div class="skeleton-grid">${Array(9).fill(`
        <div class="skeleton-card">
          <div class="skel skel-tag"></div>
          <div class="skel skel-h"></div>
          <div class="skel skel-h2"></div>
          <div class="skel skel-p"></div>
          <div class="skel skel-p2"></div>
        </div>`).join('')}
      </div>`;
  }

  function renderNews() {
    const filtered = currentCat === 'tutte'
      ? allNews
      : allNews.filter(n => n.cat === currentCat);

    if (filtered.length === 0) {
      document.getElementById('newsContainer').innerHTML =
        `<div class="error-box">Nessuna notizia trovata per questa categoria.</div>`;
      return;
    }

    document.getElementById('newsContainer').innerHTML =
      `<div class="news-grid">${filtered.map(n => `
        <div class="news-card">
          <a href="${n.url}" target="_blank" rel="noopener">
            <span class="news-tag tag-${n.cat}">${n.cat}</span>
            <h3>${n.title}</h3>
            <p>${n.desc}</p>
            <div class="news-meta">
              <span class="news-source">${n.source}</span>
              <span class="news-time">${n.time}</span>
            </div>
          </a>
        </div>`).join('')}
      </div>`;
  }

  document.getElementById('tabs').addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCat = tab.dataset.cat;
    renderNews();
  });

  async function fetchFeed(feed) {
    try {
      const res = await fetch(PROXY + encodeURIComponent(feed.url));
      const data = await res.json();
      if (!data.items) return [];
      return data.items.slice(0, 10).map(item => ({
        title: stripHtml(item.title),
        desc: stripHtml(item.description).slice(0, 140) + '…',
        url: item.link,
        source: feed.source,
        time: timeAgo(item.pubDate),
        cat: feed.cat === 'auto' ? guessCategory(item.title, item.description) : feed.cat
      }));
    } catch {
      return [];
    }
  }

  async function loadAll() {
    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.classList.add('loading');
    icon.classList.add('spin');
    showSkeleton();

    try {
      const results = await Promise.all(FEEDS.map(fetchFeed));
      const flat = results.flat();

      // Deduplicazione per titolo
      const seen = new Set();
      allNews = flat
        .filter(n => { if (!n.title || seen.has(n.title)) return false; seen.add(n.title); return true; })
        .sort((a, b) => a.time.localeCompare(b.time));

      if (allNews.length === 0) throw new Error('Nessuna notizia caricata');

      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        `Ultimo aggiornamento: ${now.toLocaleDateString('it-IT')} alle ${now.toLocaleTimeString('it-IT', { hour: '2-digit', minute: '2-digit' })}`;

      renderNews();
    } catch (err) {
      document.getElementById('newsContainer').innerHTML = `
        <div class="error-box">
          ⚠️ Errore nel caricamento delle notizie.<br>
          <span style="font-size:12px;opacity:0.7">${err.message}</span><br><br>
          <span style="font-size:12px">Riprova tra qualche secondo o controlla la connessione.</span>
        </div>`;
    }

    btn.classList.remove('loading');
    icon.classList.remove('spin');
  }

  loadAll();
  setInterval(loadAll, 10 * 60 * 1000);
</script>
</body>
</html>
